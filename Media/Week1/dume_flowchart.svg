<svg width="680" viewBox="0 0 680 740" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>DUM-E system flowchart</title>
  <desc>Flowchart showing ESP-CAM and Desktop/Serial inputs converging through the laptop to the ESP32 and servos.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <style>
    text { font-family: Arial, sans-serif; fill: #111; }
    .th  { font-size: 14px; font-weight: 600; fill: #111; }
    .ts  { font-size: 12px; font-weight: 400; fill: #555; }
    .label-light { font-size: 12px; font-weight: 400; fill: #777; }
  </style>

  <!-- ═══ ROW 1: Two input sources ═══ -->

  <!-- ESP-CAM: dark fill -->
  <rect x="60" y="40" width="220" height="56" rx="8" fill="#222" stroke="#222" stroke-width="0.5"/>
  <text class="th" x="170" y="62" text-anchor="middle" dominant-baseline="central" fill="#fff">ESP-CAM</text>
  <text class="ts" x="170" y="80" text-anchor="middle" dominant-baseline="central" fill="#bbb">Object detection on-device</text>

  <!-- Desktop App / Serial: mid-gray fill -->
  <rect x="400" y="40" width="220" height="56" rx="8" fill="#555" stroke="#555" stroke-width="0.5"/>
  <text class="th" x="510" y="62" text-anchor="middle" dominant-baseline="central" fill="#fff">Desktop App / Serial</text>
  <text class="ts" x="510" y="80" text-anchor="middle" dominant-baseline="central" fill="#ddd">Tkinter UI or REPL</text>

  <!-- ═══ Arrows ROW 1 → ROW 2 ═══ -->
  <line x1="170" y1="96" x2="170" y2="196" stroke="#000" stroke-width="1" marker-end="url(#arrow)"/>
  <text class="label-light" x="178" y="152">x, y coords</text>

  <line x1="510" y1="96" x2="510" y2="196" stroke="#000" stroke-width="1" marker-end="url(#arrow)"/>
  <text class="label-light" x="518" y="152">text command</text>

  <!-- ═══ ROW 2: Laptop ═══ -->
  <rect x="60" y="196" width="560" height="56" rx="8" fill="#e8e8e8" stroke="#999" stroke-width="0.5"/>
  <text class="th" x="340" y="218" text-anchor="middle" dominant-baseline="central">Laptop</text>
  <text class="ts" x="340" y="236" text-anchor="middle" dominant-baseline="central">Translate coords to pick command · forward to ESP32</text>

  <!-- ═══ Arrow ROW 2 → ROW 3 ═══ -->
  <line x1="340" y1="252" x2="340" y2="312" stroke="#000" stroke-width="1" marker-end="url(#arrow)"/>
  <text class="label-light" x="348" y="286">USB serial</text>

  <!-- ═══ ROW 3: ESP32 ═══ -->
  <rect x="110" y="312" width="460" height="56" rx="8" fill="#e8e8e8" stroke="#999" stroke-width="0.5"/>
  <text class="th" x="340" y="334" text-anchor="middle" dominant-baseline="central">ESP32 — main.py</text>
  <text class="ts" x="340" y="352" text-anchor="middle" dominant-baseline="central">Parse command · IntentParser · safety check</text>

  <!-- ═══ Arrow ROW 3 → Diamond ═══ -->
  <line x1="340" y1="368" x2="340" y2="408" stroke="#000" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- ═══ Safety diamond ═══ -->
  <polygon points="340,408 440,444 340,480 240,444" fill="#fff" stroke="#555" stroke-width="1"/>
  <text class="th" x="340" y="440" text-anchor="middle" dominant-baseline="central">Stop / reset?</text>
  <text class="ts" x="340" y="458" text-anchor="middle" dominant-baseline="central">Safety check</text>

  <!-- Yes → halt -->
  <path d="M440 444 L560 444 L560 530" fill="none" stroke="#888" stroke-width="1" marker-end="url(#arrow-gray)"/>
  <text class="label-light" x="492" y="437">stop</text>
  <rect x="490" y="530" width="130" height="44" rx="8" fill="#fff" stroke="#555" stroke-width="0.5"/>
  <text class="th" x="555" y="552" text-anchor="middle" dominant-baseline="central">Halt servos</text>

  <!-- No → proceed -->
  <line x1="340" y1="480" x2="340" y2="530" stroke="#000" stroke-width="1" marker-end="url(#arrow)"/>
  <text class="label-light" x="348" y="510">proceed</text>

  <!-- ═══ ROW 4: CommandRouter + MotionController ═══ -->
  <rect x="110" y="530" width="340" height="56" rx="8" fill="#e8e8e8" stroke="#999" stroke-width="0.5"/>
  <text class="th" x="280" y="552" text-anchor="middle" dominant-baseline="central">CommandRouter + MotionController</text>
  <text class="ts" x="280" y="570" text-anchor="middle" dominant-baseline="central">Smooth moves · named poses</text>

  <!-- ═══ Arrow ROW 4 → ROW 5 ═══ -->
  <line x1="280" y1="586" x2="280" y2="646" stroke="#000" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- ═══ ROW 5: Servos ═══ -->
  <rect x="110" y="646" width="340" height="56" rx="8" fill="#222" stroke="#222" stroke-width="0.5"/>
  <text class="th" x="280" y="668" text-anchor="middle" dominant-baseline="central" fill="#fff">5 × PWM servos</text>
  <text class="ts" x="280" y="686" text-anchor="middle" dominant-baseline="central" fill="#bbb">Arm moves within safety limits</text>

</svg>
