<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DUM-E Dashboard</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <header class="header">
    <h1>DUM-E Dashboard</h1>
    <p class="tag">Laptop dashboard · ROS topic simulated in logs when ros2 is off</p>
  </header>

  <main class="main">
    <section class="card" aria-label="Command">
      <h2>Command</h2>
      <div class="command-row">
        <input type="text" id="cmd-input" placeholder="e.g. home, ready, pick bottle, hello" autocomplete="off" />
        <button type="button" id="cmd-send">Send</button>
      </div>
      <div class="quick-actions" role="group" aria-label="Quick actions">
        <button type="button" data-quick="home">Home</button>
        <button type="button" data-quick="ready">Ready</button>
        <button type="button" data-quick="down">Down</button>
        <button type="button" data-quick="stop">Stop</button>
        <button type="button" data-quick="reset">Reset</button>
        <button type="button" data-quick="hello">Hello</button>
      </div>
    </section>

    <section class="card" aria-label="Status">
      <h2>Status</h2>
      <dl class="status-grid">
        <dt>State</dt><dd id="st-state">—</dd>
        <dt>ROS state</dt><dd id="st-ros">—</dd>
        <dt>Behavior</dt><dd id="st-behavior">—</dd>
        <dt>Pose</dt><dd id="st-pose">—</dd>
        <dt>Safety</dt><dd id="st-safety">—</dd>
        <dt>Simulation</dt><dd id="st-sim">—</dd>
      </dl>
    </section>

    <section class="card" aria-label="Logs">
      <h2>Logs</h2>
      <pre id="logs" class="logs"></pre>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
